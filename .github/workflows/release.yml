name: Build & Release JAT v8 installers

# Triggers:
#   • Push a tag like `v8.0.1` → automatic build + release
#   • Manual run via "Run workflow" button on the Actions tab
on:
  push:
    tags:
      - 'v8.*'
  workflow_dispatch:

permissions:
  contents: write  # required so the action can create a Release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: '*Setup*.exe'
            label: Windows
          - os: macos-latest
            artifact: '*.dmg'
            label: macOS
          - os: ubuntu-latest
            artifact: '*.AppImage'
            label: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: app
        run: npm install --no-audit --no-fund

      - name: Pre-build env dump
        working-directory: app
        shell: bash
        run: |
          echo "::group::Environment"
          node --version
          npm --version
          echo "::endgroup::"
          echo "::group::package.json"
          cat package.json
          echo "::endgroup::"

      - name: Build (${{ matrix.label }})
        working-directory: app
        run: npm run build
        env:
          # Avoid the auto-publish flow; we attach files explicitly below.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Helpful diagnostics if the build fails — surfaced in the run log,
          # which Actions exposes on the Summary page even without auth.
          DEBUG: electron-builder

      - name: List build output
        if: always()
        working-directory: app
        shell: bash
        run: |
          echo "::group::dist/ contents"
          ls -la dist/ 2>/dev/null || echo "(no dist/)"
          echo "::endgroup::"
          echo "::group::dist/ recursive (top 50)"
          find dist -maxdepth 3 -print 2>/dev/null | head -50 || true
          echo "::endgroup::"

      - name: Collect logs on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p /tmp/jat-logs
          # npm debug logs (any platform)
          if [ -d "$HOME/.npm/_logs" ]; then cp -r "$HOME/.npm/_logs" /tmp/jat-logs/npm-logs 2>/dev/null || true; fi
          # electron-builder debug output (sometimes written into the app dir)
          cp -r app/dist /tmp/jat-logs/dist 2>/dev/null || true
          # Recent stdout — node_modules listing for sanity
          ls -la app 2>/dev/null > /tmp/jat-logs/app-ls.txt || true
          ls -la app/node_modules 2>/dev/null | head -40 > /tmp/jat-logs/app-node_modules-ls.txt || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ matrix.label }}
          path: /tmp/jat-logs
          if-no-files-found: ignore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jat-v8-${{ matrix.label }}
          path: app/dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename for predictable URLs
        shell: bash
        run: |
          mkdir -p release
          # Windows
          if compgen -G "artifacts/jat-v8-Windows/*.exe" > /dev/null; then
            cp artifacts/jat-v8-Windows/*.exe release/JAT-v8-setup.exe
          fi
          # macOS
          if compgen -G "artifacts/jat-v8-macOS/*.dmg" > /dev/null; then
            cp artifacts/jat-v8-macOS/*.dmg release/JAT-v8.dmg
          fi
          # Linux
          if compgen -G "artifacts/jat-v8-Linux/*.AppImage" > /dev/null; then
            cp artifacts/jat-v8-Linux/*.AppImage release/JAT-v8.AppImage
          fi
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
