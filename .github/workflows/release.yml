name: Build & Release JAT v10 installers

# Triggers:
#   • Push a tag like `v10.0.0` → automatic build + release
#   • Manual run via "Run workflow" button on the Actions tab
on:
  push:
    tags:
      - 'v10.*'
  workflow_dispatch:

permissions:
  contents: write  # required so the action can create a Release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: '*setup*.exe'
            label: Windows
          - os: macos-latest
            artifact: '*.dmg'
            label: macOS
          - os: ubuntu-latest
            artifact: '*.AppImage'
            label: Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: app
        run: npm install --no-audit --no-fund

      - name: Generate proper multi-resolution icons from SVG
        working-directory: app
        shell: bash
        run: |
          npm install sharp --no-save --no-audit --no-fund
          node build/make-icons.mjs

      - name: Build (${{ matrix.label }})
        working-directory: app
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - name: List build output
        if: always()
        working-directory: app
        shell: bash
        run: |
          echo "::group::dist/ contents"
          ls -la dist/ 2>/dev/null || echo "(no dist/)"
          echo "::endgroup::"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jat-v10-${{ matrix.label }}
          # Include the installer AND the *.yml + *.blockmap metadata files
          # that electron-updater will need once that feature is added.
          path: |
            app/dist/${{ matrix.artifact }}
            app/dist/latest*.yml
            app/dist/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # Publish even when some matrix builds fail — Windows-only release is fine
    # for the v10 skeleton phase. The Stage step will guard each per-platform
    # copy with `compgen`, so missing platforms become silently absent rather
    # than a hard failure.
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # Skip artifacts from failed jobs without crashing the release step
        continue-on-error: true

      - name: Stage release files
        shell: bash
        run: |
          mkdir -p release
          # Windows — electron-builder already names this JAT-v10-setup.exe
          # via the `artifactName` in package.json.
          if compgen -G "artifacts/jat-v10-Windows/*.exe" > /dev/null; then
            cp artifacts/jat-v10-Windows/*.exe release/JAT-v10-setup.exe
          fi
          if compgen -G "artifacts/jat-v10-Windows/latest.yml" > /dev/null; then
            cp artifacts/jat-v10-Windows/latest.yml release/latest.yml
          fi
          if compgen -G "artifacts/jat-v10-Windows/*.blockmap" > /dev/null; then
            cp artifacts/jat-v10-Windows/*.blockmap release/ 2>/dev/null || true
          fi
          # macOS
          if compgen -G "artifacts/jat-v10-macOS/*.dmg" > /dev/null; then
            cp artifacts/jat-v10-macOS/*.dmg release/JAT-v10.dmg
          fi
          if compgen -G "artifacts/jat-v10-macOS/latest-mac.yml" > /dev/null; then
            cp artifacts/jat-v10-macOS/latest-mac.yml release/latest-mac.yml
          fi
          if compgen -G "artifacts/jat-v10-macOS/*.blockmap" > /dev/null; then
            cp artifacts/jat-v10-macOS/*.blockmap release/ 2>/dev/null || true
          fi
          # Linux
          if compgen -G "artifacts/jat-v10-Linux/*.AppImage" > /dev/null; then
            cp artifacts/jat-v10-Linux/*.AppImage release/JAT-v10.AppImage
          fi
          if compgen -G "artifacts/jat-v10-Linux/latest-linux.yml" > /dev/null; then
            cp artifacts/jat-v10-Linux/latest-linux.yml release/latest-linux.yml
          fi
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: false
