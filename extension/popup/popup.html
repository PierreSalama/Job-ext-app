<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Job Tracker v6</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0f172a; --bg2: #1e293b; --panel: #1e293b;
    --border: rgba(255,255,255,0.08); --text: #f8fafc; --muted: #94a3b8;
    --primary: #6366f1; --primary2: #8b5cf6;
    --success: #10b981; --warn: #f59e0b; --danger: #ef4444;
  }
  body[data-mode="light"] { color-scheme: light; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; width: 360px; height: 520px; margin: 0; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }
  .h { padding: 14px 16px 12px; background: linear-gradient(135deg, var(--primary), var(--primary2)); color: #fff; }
  .h .greeting { font-size: 14px; font-weight: 700; }
  .h .sub { font-size: 11px; opacity: 0.95; margin-top: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 600; background: rgba(255,255,255,0.18); }
  .pill.ok { background: rgba(16,185,129,0.45); }
  .pill.bad { background: rgba(239,68,68,0.45); }
  .body { flex: 1; overflow-y: auto; padding: 12px 14px; }
  .section { margin-bottom: 14px; }
  .section h3 { margin: 0 0 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); font-weight: 700; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .s { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 6px; text-align: center; }
  .s .v { font-size: 18px; font-weight: 700; line-height: 1; }
  .s .l { font-size: 9px; text-transform: uppercase; letter-spacing: 0.04em; opacity: 0.7; margin-top: 4px; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel); margin-bottom: 4px; font-size: 12px; gap: 8px; }
  .row .label { flex: 1; overflow: hidden; }
  .row strong { display: block; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row small { color: var(--muted); font-size: 10px; }
  .empty { font-size: 11px; color: var(--muted); text-align: center; padding: 8px; font-style: italic; }
  button.btn { background: rgba(99,102,241,0.18); color: #c7d2fe; border: 0; border-radius: 6px; padding: 7px 10px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.12s; }
  body[data-mode="light"] button.btn { background: rgba(99,102,241,0.10); color: var(--primary); }
  button.btn:hover { background: rgba(99,102,241,0.28); }
  button.btn.primary { background: var(--primary); color: #fff; }
  button.btn.primary:hover { filter: brightness(1.1); }
  button.btn.small { padding: 4px 8px; font-size: 10px; }
  .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .nudge { background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.10)); border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; padding: 10px 12px; font-size: 12px; line-height: 1.4; }
  .nudge strong { display: block; margin-bottom: 4px; font-size: 12px; }
  .footer { padding: 10px 14px; border-top: 1px solid var(--border); background: var(--panel); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .footer label { font-size: 10px; color: var(--muted); flex: 0 0 auto; }
  .footer select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 4px 6px; font-size: 11px; flex: 1; }
</style>
</head>
<body data-mode="dark">
  <div class="h">
    <div class="greeting" id="greet">Hello</div>
    <div class="sub"><span id="ai-pill" class="pill">AI: checking…</span></div>
  </div>
  <div class="body">
    <div class="section">
      <h3>Today at a glance</h3>
      <div class="stats">
        <div class="s"><div class="v" id="s-today">–</div><div class="l">Today</div></div>
        <div class="s"><div class="v" id="s-week">–</div><div class="l">Week</div></div>
        <div class="s"><div class="v" id="s-total">–</div><div class="l">Total</div></div>
        <div class="s"><div class="v" id="s-active">–</div><div class="l">Active</div></div>
      </div>
    </div>
    <div class="section" id="due-section">
      <h3>Due today / overdue</h3>
      <div id="due-list"><div class="empty">Nothing due.</div></div>
    </div>
    <div class="section">
      <h3>Recent applications</h3>
      <div id="recent"></div>
    </div>
    <div class="section" id="nudge-section" hidden>
      <h3>AI nudge of the day</h3>
      <div class="nudge" id="nudge"></div>
    </div>
    <div class="section">
      <h3>Quick actions</h3>
      <div class="quick">
        <button class="btn primary" id="open">Open dashboard</button>
        <button class="btn" id="add">Add application</button>
        <button class="btn" id="sync">Sync from LinkedIn</button>
        <button class="btn" id="tour">Take the tour</button>
      </div>
    </div>
  </div>
  <div class="footer">
    <label for="theme-pick">Theme</label>
    <select id="theme-pick"></select>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
