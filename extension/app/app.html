<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Job Tracker v9</title>
<link rel="icon" id="page-favicon" href="../icons/icon32.png" />
<link rel="stylesheet" href="app.css" />
<link rel="stylesheet" href="v9.css" />
<link rel="preconnect" href="https://rsms.me/" />
<link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand"><span class="logo">JAT</span><div><strong>Job Tracker</strong><small id="brand-version" title="Click to check for updates">v9</small></div></div>
    <input id="sidebar-search" class="sidebar-search" placeholder="Filter pages…" />
    <nav id="nav"><!-- generated dynamically from lib/pages.js --></nav>
    <div class="sidebar-foot">
      <button id="sidebar-add" class="sidebar-add" title="Show hidden pages">+ Add a page</button>
      <button id="sidebar-reset" class="sidebar-reset" title="Reset sidebar to defaults">↺ Reset</button>
    </div>
    <div class="sync-pill" id="sync-pill" title="Desktop app sync status"><span class="dot"></span><span id="sync-label">Desktop app: checking…</span></div>
    <div class="ai-status" id="ai-pill"></div>
  </aside>
  <main id="main">
    <div class="topbar" id="topbar">
      <div class="breadcrumbs" id="breadcrumbs"></div>
      <div class="topbar-spacer"></div>
      <input id="global-search" class="global-search" placeholder="/  Search jobs, contacts, companies, notes…" autocomplete="off" />
      <select id="profile-switcher" class="profile-switcher" title="Switch active profile"></select>
    </div>
    <div id="global-search-results" class="global-search-results" hidden></div>
    <div id="page-content">Loading…</div>
  </main>
  <div id="toast"></div>
  <div id="cmd-palette" class="cmd-palette" hidden>
    <div class="cmd-backdrop"></div>
    <div class="cmd-modal">
      <input id="cmd-input" placeholder="Jump to a page…" autocomplete="off" />
      <div id="cmd-list" class="cmd-list"></div>
      <div class="cmd-hint">↑↓ to navigate · Enter to open · Esc to close</div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
